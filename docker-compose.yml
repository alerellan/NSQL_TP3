services: 
  frontend:
    build: ./frontend
    ports: 
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm start
    depends_on:
      - backend


  backend:
    build: ./backend
    ports: 
      - "5000:5000"
    volumes:
      - ./backend:/app

    command: python app.py
    depends_on:
      - redis
 
  redis:
    image: redis:alpine
    